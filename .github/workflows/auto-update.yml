name: Auto Update README

on:
  push:
    branches:
      - main

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Update README timestamp
        run: |
          echo "Last Updated: $(date)" >> README.md

      - name: Commit changes
        run: |
          git config --global user.name "narasimha1902"
          git config --global user.email "narasimha1902@users.noreply.github.com"
          git add .
          git commit -m "Auto update README"
          git push
